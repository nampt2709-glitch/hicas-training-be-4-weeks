services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      # Mật khẩu SA duy nhất cho stack; hai API dùng cùng User Id=sa và Password= giá trị này (compose ghép vào connection string).
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "${SQLSERVER_PORT:-18433}:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  commentapi:
    build:
      context: .
      dockerfile: CommentAPI/Dockerfile
    ports:
      - "${COMMENTAPI_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      # Cùng máy chủ sqlserver, database riêng HICAS_Comment_API, cùng tài khoản sa.
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=HICAS_Comment_API;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True"
      ConnectionStrings__Redis: "redis:6379"
      # K6 / load-test: scale fixed-window rate limits (same as launchSettings when omitted = strict 1).
      RATE_LIMIT_PERMIT_MULTIPLIER: "${RATE_LIMIT_PERMIT_MULTIPLIER:-25}"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started

  apartmentapi:
    build:
      context: .
      dockerfile: ApartmentAPI/Dockerfile
    ports:
      - "${APARTMENTAPI_PORT:-8081}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      # Cùng sqlserver và sa; chỉ khác database HICAS_Apartment_API.
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=HICAS_Apartment_API;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True"
      # Cùng instance Redis với CommentAPI (prefix khóa khác nhau: ApartmentAPI: vs CommentAPI: trong code).
      ConnectionStrings__Redis: "redis:6379"
      RATE_LIMIT_PERMIT_MULTIPLIER: "${RATE_LIMIT_PERMIT_MULTIPLIER:-25}"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
