services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "${SQLSERVER_PORT:-18433}:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  commentapi:
    build:
      context: .
      dockerfile: CommentAPI/Dockerfile
    ports:
      - "${COMMENTAPI_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__DefaultConnection: "${COMMENTAPI_DOCKER_DEFAULT_CONNECTION}"
      ConnectionStrings__Redis: "${COMMENTAPI_DOCKER_REDIS_CONNECTION}"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
